<!DOCTYPE html>
<html>
<body style="width: 500px; border: 1px solid black;">

  <!-- Original Mermaid SVG -->
  <svg width="100%" style="max-width: 85px;" viewBox="0 0 85 174" style="border: 1px solid red;">
    <rect width="85" height="174" fill="red"/>
  </svg>

  <hr>

  <!-- Cleaned SVG with viewBox and max-width: 100% -->
  <svg style="max-width: 100%; height: auto;" viewBox="0 0 85 174">
    <rect width="85" height="174" fill="blue"/>
  </svg>

  <hr>

  <!-- Large SVG with viewBox and max-width: 100% -->
  <svg style="max-width: 100%; height: auto;" viewBox="0 0 1200 174">
    <rect width="1200" height="174" fill="green"/>
  </svg>

</body>
</html>
